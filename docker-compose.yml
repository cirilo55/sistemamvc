services:
  app:
    build: .
    command: sh -c "mkdir -p storage/cache sys/logs imgs/profile && chown -R www-data:www-data storage sys/logs imgs/profile && apache2-foreground"
    ports:
      - "8080:80"
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: sistemamvc
      DB_USERNAME: app
      DB_PASSWORD: secret
    volumes:
      - ./:/var/www/html
      - uploads:/var/www/html/imgs/profile
      - ./sys/logs:/var/www/html/sys/logs
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: sistemamvc
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./sys/database/db.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 90s

volumes:
  db_data:
  uploads:
